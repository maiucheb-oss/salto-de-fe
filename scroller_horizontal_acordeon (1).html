<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acordeón fotográfico</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .viewport {
      width: 100vw;
      height: 100vh;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .track {
      display: flex;
      align-items: center;
      height: 100%;
      gap: 12px;
      padding: 12px;
    }

    .track img {
      height: calc(100vh - 24px);
      width: auto;
      flex-shrink: 0;
      object-fit: contain;
      scroll-snap-align: start;
    }

    .hint {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 12px;
      color: #999;
      letter-spacing: 0.04em;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="viewport">
    <div class="track">
      <!-- Reemplazá los nombres por tus imágenes reales -->
      <img src="foto01.jpg" alt="" />
      <img src="foto02.jpg" alt="" />
      <img src="foto03.jpg" alt="" />
      <img src="foto04.jpg" alt="" />
      <img src="foto05.jpg" alt="" />
    </div>
  </div>

  <div class="hint">deslizar →</div>

</body>
</html>
